name: Build TouchMirror APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle Wrapper
        working-directory: app
        run: gradle wrapper --gradle-version 8.4

      - name: Grant gradlew execute permission
        run: chmod +x app/gradlew

      - name: Generate signing keystore
        working-directory: app/app
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore debug.keystore \
            -storepass android \
            -dname "CN=TouchMirror,O=TouchMirror,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Build Release APK
        working-directory: app
        env:
          KEYSTORE_PATH: debug.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace

      - name: Build Debug APK (fallback)
        if: failure()
        working-directory: app
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace

      - name: List generated APKs
        if: always()
        run: find app -name "*.apk" -type f 2>/dev/null || echo "No APKs found"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TouchMirror-Release-APK
          path: app/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Debug APK (fallback)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TouchMirror-Debug-APK
          path: app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release on Tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/app/build/outputs/apk/release/*.apk
            app/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
